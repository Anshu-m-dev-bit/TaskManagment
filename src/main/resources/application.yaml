spring:
  application:
    name: TaskManagment
  jpa:
    hibernate:
      ddl-auto: create   # or create-drop
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  h2:
    console:
      enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
